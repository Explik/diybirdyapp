<div class="container mx-auto p-4 max-w-3xl">

  <p i18n class="text-lg font-semibold mb-2">Flashcard sets:</p>

  @for (deck of flashcardDecks; track deck) {
    <app-container layout="double" [routerLink]="['/flashcard-deck', deck.id]" class="cursor-pointer block mb-2">
      <span left i18n class="flex-grow">Deck "{{deck.name}}"</span>
      <span right>
        <i class="ml-2">📄</i>
      </span>
    </app-container>
  }

  <app-container layout="double" (click)="addFlashcardDeck()" class="cursor-pointer block">
    <span left i18n class="flex-grow">Add deck</span>
    <span right>
      <i class="ml-2">➕</i>
    </span>
  </app-container>
</div>
