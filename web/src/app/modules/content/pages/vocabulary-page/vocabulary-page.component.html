<div class="container mx-auto p-4">
  <h1 i18n class="text-2xl font-bold mb-4">Your vocabulary</h1>

  <h2 i18n class="text-xl font-semibold mb-2">Your words</h2>
  <ul class="max-w-md">
    @for (word of vocabulary?.words; track word) {
      <li class="mb-2 p-2 border border-gray-300 rounded cursor-pointer" (click)="playAudio(word.pronunciationUrl)">
        @if (word.pronunciationUrl) {
          <app-icon icon="mdi-volume-high" class="mr-2" />
        }
        {{ word.text }}
      </li>
    }
  </ul>
</div>
