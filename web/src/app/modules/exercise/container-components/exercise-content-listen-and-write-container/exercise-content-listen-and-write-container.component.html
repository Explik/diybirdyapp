<app-instruction
  i18n-title title="Can you hear it?"
i18n-instruction instruction="Write what it says"></app-instruction>

<div class="block my-4 ml-2">
  @if (content) {
    <app-dynamic-audio-content
    [data]="content"></app-dynamic-audio-content>
  }
</div>


@if (input) {
  <app-exercise-input-write-text
  [input]="input!"></app-exercise-input-write-text>
}
