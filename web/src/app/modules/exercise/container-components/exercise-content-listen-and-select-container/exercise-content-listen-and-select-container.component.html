<app-instruction
  i18n-title title="Can you hear it?"
i18n-instruction instruction='Select what it says'></app-instruction>

<div class="block mt-4 mb-8 ml-2">
  @if (content) {
    <app-dynamic-audio-content
    [data]="content"></app-dynamic-audio-content>
  }
</div>

@if (input) {
  <app-exercise-input-select-options
    [input]="input"
  (optionSelected)="handleOptionSelected($event)"></app-exercise-input-select-options>
}
