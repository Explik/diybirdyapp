<app-instruction
  title="Can you pronounce this?"
instruction='Click the button and do your best attempt'></app-instruction>

@if (content) {
  <app-dynamic-text-content [data]="content" class="block mb-4" />
}

@if (input) {
  <app-exercise-input-record-audio
    [input]="input"
  (recordingFinished)="handleRecordingFinished()"></app-exercise-input-record-audio>
}
