<div class="mt-2 mb-2">
  <div class="flex flex-wrap mb-2">
    @for (id of selectedOptionIds; track id; let i = $index) {
      <div
        class="p-2 mr-2 bg-blue-200 rounded cursor-pointer"
        (click)="removeWord(i)"
        >
        {{ getOptionTextById(id) }}
      </div>
    }
    @for (_ of emptySlots; track _) {
      <div
        class="p-2 mr-2 bg-gray-200 rounded"
        >
        &nbsp;
      </div>
    }
  </div>
  <div class="flex flex-wrap">
    @for(option of options; track option) {
      @if (!selectedOptionIds.includes(option.id)) {
        <div
          class="p-2 mr-2 bg-green-200 rounded cursor-pointer"
          (click)="addWord(option.id)"
          >
          {{ option.text }}
        </div>
      }
    }
  </div>
</div>
