@if (flashcardData && !flashcardSideData) {
  <app-flashcard [side]="side">
    <app-dynamic-content front [data]="flashcardData.front" />
    <app-dynamic-content back [data]="flashcardData.back" />
  </app-flashcard>
}

@if (flashcardSideData && !flashcardData) {
  <app-flashcard [isFlippable]="false">
    <app-dynamic-content front [data]="flashcardSideData.content" />
  </app-flashcard>
}

@if (flashcardData && flashcardSideData) {
  <p>Invalid state</p>
}
