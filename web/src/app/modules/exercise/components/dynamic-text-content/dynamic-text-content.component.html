@if (data) {
  <ng-content>
    <div class="flex gap-2">
      @if (data.pronunciationUrl) {
        <app-icon icon="mdi-volume-high" class="flex-shrink-0" tabindex="0"></app-icon>
      }
      <div class="flex flex-col">
        <span>{{data.text}}</span>
        @if (data.transcription) {
          <span class="text-gray-400 italic">{{data.transcription}}</span>
        }
      </div>
    </div>
  </ng-content>
}
