<div class="w-full">
  <button
    class="w-full px-4 flex items-center relative transition-all duration-100 ease-in-out cursor-pointer shadow-[3px_3px_rgba(0,0,0,1)] hover:shadow-[2px_2px_rgba(0,0,0,1)] hover:translate-x-[1px] hover:translate-y-[1px] active:shadow-none active:translate-x-[3px] active:translate-y-[3px] disabled:opacity-60 disabled:cursor-not-allowed border border-black bg-white text-black"
    [ngClass]="[
      heightClass,
      layout === 'single' ? 'justify-center' : 'justify-between',
      disabled ? 'hover:translate-x-0 hover:translate-y-0 hover:shadow-[3px_3px_rgba(0,0,0,1)]' : ''
    ]"
    [type]="type"
    [disabled]="disabled"
    [attr.aria-label]="ariaLabel"
    [attr.title]="title"
    [attr.name]="name"
    [attr.value]="value"
    [attr.tabindex]="tabindex"
    [attr.autofocus]="autofocus || null"
    [attr.form]="form"
    [attr.formaction]="formaction"
    [attr.formenctype]="formenctype"
    [attr.formmethod]="formmethod"
    [attr.formnovalidate]="formnovalidate || null"
    [attr.formtarget]="formtarget"
    (mousedown)="onMouseDown($event)"
    (click)="onClick($event)">

    <!-- Single layout -->
    @if (layout === 'single') {
      <ng-content></ng-content>
    }

    <!-- Double layout -->
    @if (layout === 'double') {
      <div class="flex items-center">
        <ng-content select="[left]"></ng-content>
      </div>
      <div class="flex items-center">
        <ng-content select="[right]"></ng-content>
      </div>
    }
  </button>
</div>
