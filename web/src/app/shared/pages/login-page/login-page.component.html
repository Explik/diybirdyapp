<div class="max-w-md mx-auto p-4">
  <h1 class="text-2xl font-bold mb-6" i18n>Login</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <app-form-field fieldId="username">
      <app-label class="block mb-1" i18n>Email</app-label>
      <app-text-field formControlName="username"></app-text-field>
      @if (form.get('username')?.touched && form.get('username')?.invalid) {
        <app-form-error i18n>Username is required</app-form-error>
      }
    </app-form-field>

    <app-form-field fieldId="password">
      <app-label class="block mb-1" i18n>Password</app-label>
      <app-text-field formControlName="password" [type]="'password'"></app-text-field>
      @if (form.get('password')?.touched && form.get('password')?.invalid) {
        <app-form-error i18n>Password is required</app-form-error>
      }
    </app-form-field>

    <div>
      <app-button type="submit" [disabled]="loading || form.invalid" variant="primary" i18n>Login</app-button>
    </div>

    @if (error) {
      <div class="text-red-600" i18n>Login failed</div>
    }
  </form>

  <div class="mt-8">
    <span i18n>Don't have an account? </span>
    <a routerLink="/signup" class="text-blue-600 hover:underline cursor-pointer" i18n>Sign up</a>
  </div>
</div>
